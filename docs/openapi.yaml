openapi: 3.0.3
info:
  title: Menudo Backend API
  version: 2.0.0
  description: Swagger documentation for the Menudo backend.
servers:
  - url: https://financeapp-backend-eight.vercel.app
tags:
  - name: Health
  - name: Auth
  - name: Categories
  - name: Wallets
  - name: Transactions
  - name: Budgets
  - name: Recurring
  - name: Dashboard
  - name: Insights
  - name: Spaces
  - name: Invitations
  - name: Alerts
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            codigo:
              type: string
            mensaje:
              type: string
    RegisterRequest:
      type: object
      required: [nombre, email, password]
      properties:
        nombre:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        moneda_base:
          type: string
          enum: [DOP, USD]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    CategoryRequest:
      type: object
      required: [nombre]
      example:
        nombre: Conciertos
        tipo: gasto
        icono: music
        color_hex: "#F59E0B"
        categoria_padre_id: 7
      properties:
        nombre:
          type: string
        tipo:
          type: string
          enum: [ingreso, gasto, transferencia]
          description: Se hereda del padre si se envía categoria_padre_id. Default gasto.
        icono:
          type: string
        color_hex:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Se hereda del padre si se envía categoria_padre_id.
        categoria_padre_id:
          type: integer
          nullable: true
    CategoryUpdateRequest:
      type: object
      description: All fields are optional.
      properties:
        nombre:
          type: string
        tipo:
          type: string
          enum: [ingreso, gasto, transferencia]
        icono:
          type: string
        color_hex:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        categoria_padre_id:
          type: integer
          nullable: true
    WalletRequest:
      type: object
      required: [nombre, tipo, saldo]
      example:
        nombre: Tarjeta Gold BHD
        tipo: gastos
        saldo: 19000
        moneda: DOP
        color_hex: "#EF4444"
        icono: creditCard
        incluir_en_patrimonio: false
      properties:
        nombre:
          type: string
        tipo:
          type: string
          enum: [gastos, cuentas, deudas]
        saldo:
          type: number
        moneda:
          type: string
          enum: [DOP, USD]
        color_hex:
          type: string
        icono:
          type: string
        incluir_en_patrimonio:
          type: boolean
          default: true
          description: Si false, no suma al patrimonio neto. Útil para tarjetas de crédito.
    WalletUpdateRequest:
      type: object
      description: All fields are optional.
      properties:
        nombre:
          type: string
        tipo:
          type: string
          enum: [gastos, cuentas, deudas]
        saldo:
          type: number
        moneda:
          type: string
          enum: [DOP, USD]
        color_hex:
          type: string
        icono:
          type: string
        incluir_en_patrimonio:
          type: boolean
    TransactionRequest:
      type: object
      required: [fecha, descripcion, monto, tipo, walletId]
      example:
        fecha: "2026-03-09"
        descripcion: "Compra supermercado"
        monto: 4200
        tipo: gasto
        catKey: groceries
        walletId: 3
        moneda: DOP
      properties:
        fecha:
          type: string
          example: "2026-03-09"
        descripcion:
          type: string
        monto:
          type: number
        tipo:
          type: string
          enum: [ingreso, gasto, transferencia]
        budgetId:
          type: integer
          nullable: true
          description: Opcional. Si no se envía, la transacción queda fuera de cualquier presupuesto.
        catKey:
          type: string
          nullable: true
          description: Requerido para ingresos y gastos. Opcional en transferencias.
        walletId:
          type: integer
        toWalletId:
          type: integer
          description: Requerido para transferencias.
        nota:
          type: string
        moneda:
          type: string
          enum: [DOP, USD]
    TransactionUpdateRequest:
      type: object
      description: All fields are optional.
      properties:
        fecha:
          type: string
          example: "2026-03-09"
        descripcion:
          type: string
        monto:
          type: number
        tipo:
          type: string
          enum: [ingreso, gasto, transferencia]
        budgetId:
          type: integer
          nullable: true
        catKey:
          type: string
          nullable: true
        walletId:
          type: integer
        toWalletId:
          type: integer
          nullable: true
        nota:
          type: string
          nullable: true
        moneda:
          type: string
          enum: [DOP, USD]
    BudgetRequest:
      type: object
      required: [nombre, periodo]
      example:
        nombre: Gastos del hogar
        periodo: mensual
        dia_inicio: 1
        ahorro_objetivo: 12000
        ingresos_detalle:
          - categoriaId: 101
            monto: 85000
        categorias:
          - categoriaId: 201
            limite: 25000
        invitados:
          - "maria@gmail.com"
          - "pedro@gmail.com"
      properties:
        nombre:
          type: string
        periodo:
          type: string
          enum: [mensual, quincenal, semanal, unico]
        dia_inicio:
          type: integer
          minimum: 1
          maximum: 31
        ingresos:
          type: number
        ahorro_objetivo:
          type: number
        activo:
          type: boolean
        categorias:
          type: array
          description: Límites de gasto por categoría.
          items:
            type: object
            properties:
              categoriaId:
                type: integer
              limite:
                type: number
        ingresos_detalle:
          type: array
          description: Fuentes de ingresos planeadas.
          items:
            type: object
            properties:
              categoriaId:
                type: integer
              monto:
                type: number
        invitados:
          type: array
          description: Emails a invitar al presupuesto. Máximo 3 (dueño + 3 = 4 total). Se envía email y se crea alerta si el invitado ya tiene cuenta.
          maxItems: 3
          items:
            type: string
            format: email
    BudgetUpdateRequest:
      type: object
      description: All fields are optional.
      example:
        ahorro_objetivo: 15000
        categorias:
          - categoriaId: 201
            limite: 28000
        ingresos_detalle:
          - categoriaId: 101
            monto: 90000
      properties:
        nombre:
          type: string
        periodo:
          type: string
          enum: [mensual, quincenal, semanal, unico]
        dia_inicio:
          type: integer
          minimum: 1
          maximum: 31
        ingresos:
          type: number
        ahorro_objetivo:
          type: number
        activo:
          type: boolean
        categorias:
          type: array
          description: Reemplaza todos los límites de gasto por categoría del presupuesto.
          items:
            type: object
            properties:
              categoriaId:
                type: integer
              limite:
                type: number
        ingresos_detalle:
          type: array
          items:
            type: object
            properties:
              categoriaId:
                type: integer
              monto:
                type: number
    RecurringRequest:
      type: object
      required: [tipo, monto, frecuencia, diaEjecucion]
      example:
        walletId: 10
        catKey: salario
        tipo: ingreso
        monto: 25000
        moneda: DOP
        descripcion: Salario mensual
        frecuencia: mensual
        diaEjecucion: 25
        activo: true
      properties:
        budgetId:
          type: integer
          nullable: true
          description: Opcional. Si no se envía, la automática queda fuera de cualquier presupuesto.
        walletId:
          type: integer
          nullable: true
        catKey:
          type: string
          nullable: true
        tipo:
          type: string
          enum: [ingreso, gasto, transferencia]
        monto:
          type: number
        moneda:
          type: string
          enum: [DOP, USD]
        descripcion:
          type: string
          nullable: true
        nota:
          type: string
          nullable: true
        frecuencia:
          type: string
          enum: [mensual, quincenal, semanal]
        diaEjecucion:
          type: integer
          minimum: 1
          maximum: 31
        activo:
          type: boolean
    RecurringUpdateRequest:
      type: object
      description: All fields are optional.
      properties:
        budgetId:
          type: integer
          nullable: true
        walletId:
          type: integer
          nullable: true
        catKey:
          type: string
          nullable: true
        tipo:
          type: string
          enum: [ingreso, gasto, transferencia]
        monto:
          type: number
        moneda:
          type: string
          enum: [DOP, USD]
        descripcion:
          type: string
          nullable: true
        nota:
          type: string
          nullable: true
        frecuencia:
          type: string
          enum: [mensual, quincenal, semanal]
        diaEjecucion:
          type: integer
          minimum: 1
          maximum: 31
        activo:
          type: boolean
    ProfileUpdateRequest:
      type: object
      description: All fields are optional.
      properties:
        nombre:
          type: string
        moneda_base:
          type: string
          enum: [DOP, USD]
        meta_financiera:
          type: string
          nullable: true
        meta_monto:
          type: number
          nullable: true
        meta_fecha:
          type: string
          example: "2026-12-31"
          nullable: true
    AcceptInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    AlertResponse:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
          enum: [gasto_elevado, meta_progreso, oportunidad_inversion, suscripcion_vence, tasa_cambio, ia_insight, invitacion_presupuesto, invitacion_aceptada]
        titulo:
          type: string
        cuerpo:
          type: string
        fue_leida:
          type: boolean
        espacio_id:
          type: integer
          nullable: true
        datos_extra:
          type: object
          description: |
            Para invitacion_presupuesto: { token, presupuesto_id, espacio_id, invitado_por, budget_nombre }
            Para invitacion_aceptada: { espacio_id, presupuesto_id, budget_nombre }
        creado_en:
          type: string
          format: date-time

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      description: Al registrarse, si el email tiene invitaciones pendientes se aceptan automáticamente y se crea una alerta de tipo invitacion_aceptada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /auth/me:
    get:
      tags: [Auth]
      summary: Get profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    patch:
      tags: [Auth]
      summary: Partially update profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: OK
    delete:
      tags: [Auth]
      summary: Delete authenticated account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deleted
  /auth/password:
    put:
      tags: [Auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          description: OK
  /auth/password/recovery:
    post:
      tags: [Auth]
      summary: Send password recovery link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                next:
                  type: string
      responses:
        "200":
          description: OK

  /categories:
    get:
      tags: [Categories]
      summary: List categories
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: formato
          schema:
            type: string
            enum: [grouped, flat]
            default: grouped
        - in: query
          name: tipo
          schema:
            type: string
            enum: [ingreso, gasto, transferencia]
      responses:
        "200":
          description: OK
    post:
      tags: [Categories]
      summary: Create category (child or standalone)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Created
  /categories/parents:
    get:
      tags: [Categories]
      summary: List parent categories only
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tipo
          schema:
            type: string
            enum: [ingreso, gasto, transferencia]
      responses:
        "200":
          description: OK
    post:
      tags: [Categories]
      summary: Create a parent category (requires tipo)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, tipo]
              properties:
                nombre:
                  type: string
                tipo:
                  type: string
                  enum: [ingreso, gasto, transferencia]
                icono:
                  type: string
                color_hex:
                  type: string
                  pattern: "^#[0-9A-Fa-f]{6}$"
      responses:
        "201":
          description: Created
  /categories/system:
    get:
      tags: [Categories]
      summary: List system categories
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tipo
          schema:
            type: string
            enum: [ingreso, gasto, transferencia]
      responses:
        "200":
          description: OK
  /categories/{id}:
    put:
      tags: [Categories]
      summary: Update category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdateRequest"
      responses:
        "200":
          description: OK
    delete:
      tags: [Categories]
      summary: Delete category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK

  /wallets:
    get:
      tags: [Wallets]
      summary: List wallets
      description: La respuesta incluye es_default e incluir_en_patrimonio por cada wallet.
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
    post:
      tags: [Wallets]
      summary: Create wallet
      description: La primera wallet creada se auto-asigna como default.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletRequest"
      responses:
        "201": { description: Created }
  /wallets/summary:
    get:
      tags: [Wallets]
      summary: Wallet summary (patrimonio neto)
      description: Solo suma wallets con incluir_en_patrimonio true.
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
  /wallets/{id}:
    get:
      tags: [Wallets]
      summary: Get wallet
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    put:
      tags: [Wallets]
      summary: Update wallet
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletUpdateRequest"
      responses:
        "200": { description: OK }
    delete:
      tags: [Wallets]
      summary: Delete wallet
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /wallets/{id}/set-default:
    patch:
      tags: [Wallets]
      summary: Set wallet as default
      description: Marca esta wallet como la default del usuario. No requiere body.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /wallets/{id}/transactions:
    get:
      tags: [Wallets]
      summary: Wallet transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200": { description: OK }

  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: budgetId
          schema: { type: integer }
        - in: query
          name: tipo
          schema: { type: string, enum: [ingreso, gasto, transferencia] }
        - in: query
          name: catKey
          schema: { type: string }
        - in: query
          name: desde
          schema: { type: string }
        - in: query
          name: hasta
          schema: { type: string }
        - in: query
          name: walletId
          schema: { type: integer }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200": { description: OK }
    post:
      tags: [Transactions]
      summary: Create transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequest"
      responses:
        "201": { description: Created }
  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get transaction
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    put:
      tags: [Transactions]
      summary: Update transaction
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdateRequest"
      responses:
        "200": { description: OK }
    delete:
      tags: [Transactions]
      summary: Delete transaction
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /budgets:
    get:
      tags: [Budgets]
      summary: List budgets
      description: Incluye presupuestos propios y compartidos (donde el usuario es miembro).
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
    post:
      tags: [Budgets]
      summary: Create budget
      description: |
        Si se envía invitados, se crea un espacio compartido automáticamente,
        se envía email a cada invitado y se crea una alerta si ya tienen cuenta.
        Máximo 3 invitados (dueño + 3 = 4 personas total).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetRequest"
      responses:
        "201": { description: Created }
  /budgets/{id}:
    get:
      tags: [Budgets]
      summary: Get budget detail
      description: |
        Respuesta incluye:
        - categorias: gastos de categorías con límite configurado
        - otros_gastos: gastos del presupuesto en categorías sin límite
        - total_gastado_real: suma de categorias + otros_gastos
        - ingresos_actuales.otros_ingresos: ingresos en categorías fuera del plan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    put:
      tags: [Budgets]
      summary: Update budget
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetUpdateRequest"
      responses:
        "200": { description: OK }
    delete:
      tags: [Budgets]
      summary: Delete budget
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /budgets/{id}/activate:
    patch:
      tags: [Budgets]
      summary: Activate budget
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /budgets/{id}/spending:
    get:
      tags: [Budgets]
      summary: Budget spending
      description: Devuelve categorias (con límite), otros_gastos (sin límite) y total_gastado_real.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /budgets/{id}/members:
    get:
      tags: [Budgets]
      summary: List budget members
      description: Retorna lista vacía si el presupuesto no tiene espacio compartido.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        usuario_id:
                          type: integer
                        nombre:
                          type: string
                        email:
                          type: string
                        rol:
                          type: string
                          enum: [admin, miembro]
                        es_propietario:
                          type: boolean
                        unido_en:
                          type: string
                          format: date-time
  /budgets/{id}/members/{userId}:
    delete:
      tags: [Budgets]
      summary: Remove budget member
      description: Solo el dueño (admin) puede expulsar miembros. No se puede remover al propietario.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /budgets/{id}/categories:
    post:
      tags: [Budgets]
      summary: Add category limit to budget
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoriaId, limite]
              properties:
                categoriaId:
                  type: integer
                limite:
                  type: number
      responses:
        "201": { description: Created }
  /budgets/{id}/categories/{catId}:
    put:
      tags: [Budgets]
      summary: Update category limit
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: catId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limite]
              properties:
                limite:
                  type: number
      responses:
        "200": { description: OK }
    delete:
      tags: [Budgets]
      summary: Remove category limit
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: catId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /recurring:
    get:
      tags: [Recurring]
      summary: List recurring transactions
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
    post:
      tags: [Recurring]
      summary: Create recurring transaction
      description: |
        proxima_ejecucion se calcula inteligente: si el diaEjecucion aún no pasó en el mes actual
        se ejecuta este mes, si ya pasó se ejecuta el siguiente.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringRequest"
      responses:
        "201": { description: Created }
  /recurring/{id}:
    put:
      tags: [Recurring]
      summary: Update recurring transaction
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringUpdateRequest"
      responses:
        "200": { description: OK }
    delete:
      tags: [Recurring]
      summary: Delete recurring transaction
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /recurring/{id}/toggle:
    patch:
      tags: [Recurring]
      summary: Toggle recurring active status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /recurring/process:
    post:
      tags: [Recurring]
      summary: Manually process due recurring transactions
      description: El cron job lo ejecuta automáticamente a las 6AM diario. Este endpoint es para pruebas.
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Dashboard aggregate data
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }

  /insights:
    get:
      tags: [Insights]
      summary: Insights aggregate data
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: periodo
          schema:
            type: string
            enum: [mensual, quincenal, semanal]
            default: mensual
        - in: query
          name: presupuestoId
          schema:
            type: integer
      responses:
        "200": { description: OK }

  /spaces:
    get:
      tags: [Spaces]
      summary: List spaces
      description: Los espacios son infraestructura interna. Se crean automáticamente al invitar a un presupuesto.
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
  /spaces/{id}:
    get:
      tags: [Spaces]
      summary: Get space
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    delete:
      tags: [Spaces]
      summary: Delete space
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /spaces/{id}/members:
    get:
      tags: [Spaces]
      summary: List space members
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /spaces/{id}/members/{userId}:
    patch:
      tags: [Spaces]
      summary: Update member role
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rol]
              properties:
                rol:
                  type: string
                  enum: [admin, miembro]
      responses:
        "200": { description: OK }
    delete:
      tags: [Spaces]
      summary: Remove member from space
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /spaces/{id}/invitations:
    get:
      tags: [Spaces]
      summary: List pending invitations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /spaces/{id}/invitations/{invId}:
    delete:
      tags: [Spaces]
      summary: Cancel invitation
      security:
        - bearerAuth: []
