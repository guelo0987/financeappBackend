        "200": { description: OK }

  /invitations/{token}/accept:
    get:
      tags: [Invitations]
      summary: Invitation accept page (browser)
      description: Devuelve una página HTML con botón para aceptar. Útil cuando el invitado hace clic en el email desde el navegador.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
        - in: query
          name: email
          required: true
          schema: { type: string, format: email }
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
    post:
      tags: [Invitations]
      summary: Accept invitation
      description: |
        Acepta una invitación pendiente. El usuario debe tener cuenta registrada con ese email.
        Agrega al usuario como miembro del espacio compartido del presupuesto.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
      responses:
        "200": { description: OK }

  /alerts:
    get:
      tags: [Alerts]
      summary: List alerts
      description: |
        Devuelve alertas del usuario ordenadas por más recientes primero.
        Tipos de alerta: gasto_elevado, meta_progreso, oportunidad_inversion, suscripcion_vence,
        tasa_cambio, ia_insight, invitacion_presupuesto, invitacion_aceptada.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: no_leidas
          schema:
            type: boolean
            default: false
          description: Si true, devuelve solo alertas no leídas.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
